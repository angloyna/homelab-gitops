apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.12.0"
      helm:
        valueFiles:
          - $values/apps/longhorn/values.yaml
    - repoURL: git@github.com:angloyna/homelab-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  # Manual sync on purpose: Longhorn was originally installed via plain
  # `helm install`, not ArgoCD. This Application matches the chart version
  # and values already live so ArgoCD can adopt it without changing
  # anything, but automated prune/selfHeal stays off until the initial
  # sync diff has been reviewed against the running storage layer.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
