apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flow-migrations
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: git@github.com:angloyna/homelab-gitops.git
    targetRevision: HEAD
    path: apps/flow-migrations/chart
    helm:
      valueFiles:
        - ../values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: flow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
