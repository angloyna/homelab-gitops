apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: git@github.com:spike-electric/flow.git
      targetRevision: angloyna-dev
      path: deploy/helm/flow
      helm:
        valueFiles:
          - $values/apps/flow/values.yaml
    - repoURL: git@github.com:angloyna/homelab-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: flow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
