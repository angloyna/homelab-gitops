dbName: flow_data
dbServiceName: flow-db

image:
  # Zot's ClusterIP, not its .svc.cluster.local DNS name -- see the note in
  # apps/flow/chart/values.yaml for why (image pulls don't go through CoreDNS).
  registry: 10.43.114.154:5000
  tag: dev
  # Always, not IfNotPresent -- see the note in apps/flow/chart/values.yaml.
  pullPolicy: Always

# Same Secret used by the main flow chart -- must exist in this namespace
# before the first sync. See homelab-gitops secrets checklist.
existingSecret: flow-dev-secrets

resources:
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
