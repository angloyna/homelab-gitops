apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-realtime
  labels:
    {{- include "flow.labels" . | nindent 4 }}
    app: {{ .Release.Name }}-realtime
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-realtime
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-realtime
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: realtime
          image: "{{ .Values.image.registry }}/flow-realtime:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4000
          env:
            # config/runtime.exs (MIX_ENV=prod) reads DATABASE_URL as a single
            # ecto:// URL, not split DB_* vars -- different from api/api-public.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "ecto://$(DB_USER):$(DB_PASSWORD)@{{ .Release.Name }}-db:5432/{{ .Values.db.name }}"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SECRET_KEY_BASE
            - name: PHX_HOST
              value: {{ .Values.hostname | quote }}
            - name: PORT
              value: "4000"
            - name: API_URL
              value: "http://{{ .Release.Name }}-api:8000"
          livenessProbe:
            httpGet:
              path: /livez
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.realtime.resources | nindent 12 }}
