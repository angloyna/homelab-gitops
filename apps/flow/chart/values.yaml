image:
  # Zot's ClusterIP, not its .svc.cluster.local DNS name -- kubelet/containerd
  # pull images from the node's own network namespace using the node's own
  # resolver (systemd-resolved etc), not CoreDNS, so *.svc.cluster.local
  # names never resolve for image pulls (only inside pods, via the per-pod
  # resolv.conf kubelet injects). ClusterIPs route via kube-proxy's iptables
  # rules, which apply host-wide, so this works without depending on DNS.
  # Update this if zot's Service is ever deleted/recreated (new ClusterIP).
  registry: 10.43.114.154:5000
  tag: dev
  pullPolicy: IfNotPresent

hostname: flow-dev.turdblossom.dev

# Name of a Secret (created out-of-band, not by this chart) holding all the
# real secrets -- DB_USER, DB_PASSWORD, SECRET_KEY_BASE, integration API
# keys, etc.
existingSecret: flow-dev-secrets

replicaCount: 1

# e.g. {kubernetes.io/hostname: some-node} to pin all pods to one node.
nodeSelector: {}

db:
  image: postgis/postgis:18-3.6
  name: flow_data
  storage: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

attachments:
  storage: 10Gi

api:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi

apiPublic:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

realtime:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

frontend:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Non-secret config -- rendered into a ConfigMap and consumed via envFrom.
config:
  appTimezone: "America/Chicago"
  maxUploadBytes: "104857600"
  disableScheduler: "false"
  devSkipLogin: "false"
  maxScanInputLength: "100"
  scanWorkerConcurrency: "10"
  bcExportDir: "/tmp/bc_exports"
  bcEnvironment: "Sandbox"
  paylocityBaseUrl: "https://dc1prodgwext.paylocity.com"
  paylocityEmployeeSyncSource: "paylocity"
  paylocityPunchAnomalyHours: "24"
  paylocityPunchCapHours: "12"
  paylocityPunchSyncDays: "14"
